<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NextoBite Weekly Digest</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: auto; padding: 20px; border: 1px solid #eee; }
        .header { background-color: #ff5722; color: white; padding: 10px; text-align: center; }
        .recipe-card { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .recipe-title { color: #ff5722; font-size: 1.2em; font-weight: bold; }
        .zone-tag { font-size: 0.9em; color: #777; }
        .footer { font-size: 0.8em; text-align: center; margin-top: 20px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NextoBite: Local Flavors</h1>
        <p>Top Recipes in <span th:text="${zone}">Gachibowli</span> this week!</p>
    </div>

    <div th:each="recipe : ${recipes}" class="recipe-card">
        <div class="recipe-title" th:text="${recipe.title}">Biryani</div>
        <div class="zone-tag">Neighborhood Score: <span th:text="${recipe.neighborhoodScore}">9.5</span></div>
        <p><strong>Ingredients:</strong> <span th:text="${#strings.listJoin(recipe.ingredients, ', ')}">...</span></p>
        <a th:href="@{'http://localhost:8080' + ${recipe.imageUrl}}">View Recipe Image</a>
    </div>

    <div class="footer">
        <p>You received this because you're a member of the NextoBite Hyderabad community.</p>
    </div>
</div>
</body>
</html>
